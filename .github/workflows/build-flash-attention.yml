name: FlashAttention

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      FLASH_ATTENTION_VERSION:
        description: "FlashAttention version"
        required: true
        default: "v2.7.4.post1"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build Wheel
    runs-on: depot-ubuntu-latest-64
    env:
      FLASH_ATTENTION_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.FLASH_ATTENTION_VERSION || 'v2.7.4.post1' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            torch-version: "2.4.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.10"
            torch-version: "2.5.1"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.10"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.11"
            torch-version: "2.4.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.11"
            torch-version: "2.5.1"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.11"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.12"
            torch-version: "2.4.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.12"
            torch-version: "2.5.1"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.12"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "FALSE"
          - python-version: "3.10"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"
          - python-version: "3.10"
            torch-version: "2.7.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"
          - python-version: "3.11"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"
          - python-version: "3.11"
            torch-version: "2.7.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"
          - python-version: "3.12"
            torch-version: "2.6.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"
          - python-version: "3.12"
            torch-version: "2.7.0"
            cuda-version: "12.8.1"
            cxx11_abi: "TRUE"

    steps:
      - name: Checkout Flash Attention
        uses: actions/checkout@v4
        with:
          repository: Dao-AILab/flash-attention
          ref: ${{ env.FLASH_ATTENTION_VERSION }}
          persist-credentials: false

      - name: Checkout utils
        uses: actions/checkout@v4
        with:
          path: build_scripts
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set CUDA and PyTorch versions
        run: |
          echo "CI_CUDA_VERSION=$(echo ${{ matrix.cuda-version }})" >> $GITHUB_ENV
          echo "CI_TORCH_VERSION=$(echo ${{ matrix.torch-version }})" >> $GITHUB_ENV
          echo "CI_PYTHON_VERSION=$(echo ${{ matrix.python-version }})" >> $GITHUB_ENV
          echo "MATRIX_CUDA_VERSION=$(echo ${{ matrix.cuda-version }} | awk -F \. {'print $1 $2'})" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=$(echo ${{ matrix.torch-version }} | awk -F \. {'print $1 "." $2'})" >> $GITHUB_ENV
          echo "MATRIX_PYTHON_VERSION=$(echo ${{ matrix.python-version }} | awk -F \. {'print $1 $2'})" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: |
          echo "MANYLINUX_CUDA_VERSION=$(python -c "from os import environ as env; print({'118': '11.8', '121': '12.1', '124': '12.4', '126': '12.6', '128': '12.8'}[env['MATRIX_CUDA_VERSION']])")" >> $GITHUB_ENV
          echo "MANYLINUX_CUDA_COMPAT_VERSION=$(python -c "from os import environ as env; print({'118': '11-8', '121': '12-1', '124': '12-4', '126': '12-6', '128': '12-8'}[env['MATRIX_CUDA_VERSION']])")" >> $GITHUB_ENV
          python3 -m pip install --upgrade pip
          python3 -m pip install cibuildwheel

      - name: Build wheels for Pytorch ${{ matrix.torch-version }}+cu${{ matrix.cuda-version }}
        run: |
          python3 -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: cp${{ env.MATRIX_PYTHON_VERSION }}-*64
          CIBW_MANYLINUX_X86_64_IMAGE: pytorch/manylinux2_28-builder:cuda${{ env.MANYLINUX_CUDA_VERSION }}
          CIBW_BEFORE_BUILD_LINUX: >
            (yes | dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo || true) &&
            (yum install -y cuda-driver-devel-${{ env.MANYLINUX_CUDA_COMPAT_VERSION }} || true) &&
            (yum install -y glibc glibc-devel || apt-get install -y libc6-dev || apk add --update --no-cache musl-dev || true) &&
            (yum install -y libffi-devel || apt-get install -y libffi-devel || apk add --update --no-cache libffi-devel || true) &&
            pip install --upgrade pip &&
            pip install typing-extensions==4.12.2 &&
            export TORCH_CUDA_VERSION=$(python -c "from os import environ as env; minv = {'2.4': 118, '2.5': 118, '2.6': 118, '2.7': 118}[env['MATRIX_TORCH_VERSION']]; maxv = {'2.4': 124, '2.5': 124, '2.6': 126, '2.7': 128}[env['MATRIX_TORCH_VERSION']]; print(minv if int(env['MATRIX_CUDA_VERSION']) < 120 else maxv)") &&
            pip install --no-cache-dir torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/cu${TORCH_CUDA_VERSION}
          CIBW_ENVIRONMENT: >
            CUDA_HOME="/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}"
            LIBRARY_PATH="/usr/lib64"
            LD_LIBRARY_PATH="/usr/lib64"
            LDFLAGS="-ldl -L/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/targets/x86_64-linux/lib/stubs"
            AUDITWHEEL_PLAT="manylinux_2_24_$(uname -m)"
            MATRIX_CUDA_VERSION=${{ env.MATRIX_CUDA_VERSION }}
            MATRIX_TORCH_VERSION=${{ env.MATRIX_TORCH_VERSION }}
            MATRIX_PYTHON_VERSION=${{ env.MATRIX_PYTHON_VERSION }}
            CI_CUDA_VERSION=${{ env.CI_CUDA_VERSION }}
            CI_TORCH_VERSION=${{ env.CI_TORCH_VERSION }}
            CI_PYTHON_VERSION=${{ env.CI_PYTHON_VERSION }}
            FLASH_ATTENTION_FORCE_BUILD="TRUE"
            FLASH_ATTENTION_FORCE_CXX11_ABI=${{ matrix.cxx11_abi }}
            MAX_JOBS=16
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w /tmp/cibuildwheel/repaired_wheel {wheel} --exclude libcuda.so --exclude libcuda.so.1 --exclude libc10.so --exclude libc10_cuda.so --exclude libtorch.so --exclude libtorch_python.so --exclude libtorch_cpu.so --exclude libtorch_cuda.so --exclude libtorch_cuda_cpp.so --exclude libtorch_cuda_cu.so --exclude libcudart.so.11 --exclude libcudart.so.12 --exclude libcudart.so.11.0 --exclude libcudart.so.12.0 --exclude libcurand.so.10 --exclude libcufile_rdma.so --exclude libcufile_rdma.so.1 --exclude libcufile.so.1 --exclude libcufile.so.0 --exclude libcufile.so"

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}
          if-no-files-found: error
