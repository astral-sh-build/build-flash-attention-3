name: FlashAttention-3

permissions: {}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      FLASH_ATTENTION_3_VERSION:
        description: "FlashAttention-3 version"
        required: true
        default: "b3f437fbcbeb0dd38e838cae418cfec3fb3e8fa9"
        type: string
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  plan-matrix:
    name: Plan FlashAttention-3 build matrix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    permissions:
      contents: read # for actions/checkout
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          version: "0.9.26"

      - name: Generate build matrix
        id: generate-matrix
        run: |
          echo "matrix=$(uv run --script plan-matrix.py)" >> $GITHUB_OUTPUT
        env:
          LIMIT_MATRIX: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'full-build') && '1' || '0' }}

  build-wheels:
    name: Build Wheel
    needs: [plan-matrix]
    runs-on: ${{ matrix.RUNNER }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}

    permissions:
      contents: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Determine FlashAttention-3 version
        id: flash-attention-3-version
        run: |
          # Extract FlashAttention-3 version from tag. Tags can be either:
          # - b3f437fbcbeb0dd38e838cae418cfec3fb3e8fa9 (legacy format; maps directly to FlashAttention-3 commit)
          # - b3f437fbcbeb0dd38e838cae418cfec3fb3e8fa9-r1 (new format; strip -rN suffix to get FlashAttention-3 commit)
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
            # Remove -rN suffix if present
            FLASH_ATTENTION_3_VERSION="${TAG%-r*}"
            # Map to a commit hash
            if [ "${FLASH_ATTENTION_3_VERSION}" = "v2.8.3" ]; then
              FLASH_ATTENTION_3_VERSION="b3f437fbcbeb0dd38e838cae418cfec3fb3e8fa9"
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            FLASH_ATTENTION_3_VERSION="${INPUTS_FLASH_ATTENTION_3_VERSION}"
          else
            FLASH_ATTENTION_3_VERSION="b3f437fbcbeb0dd38e838cae418cfec3fb3e8fa9"
          fi
          echo "version=${FLASH_ATTENTION_3_VERSION}" >> $GITHUB_OUTPUT
          echo "Using FlashAttention-3 version: ${FLASH_ATTENTION_3_VERSION}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUTS_FLASH_ATTENTION_3_VERSION: ${{ inputs.FLASH_ATTENTION_3_VERSION }}

      - name: Checkout Flash Attention
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: Dao-AILab/flash-attention
          ref: ${{ steps.flash-attention-3-version.outputs.version }}
          persist-credentials: false

      - name: Get source commit SHA
        id: source-commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Checkout utils
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: build_scripts
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          version: "0.9.26"
          enable-cache: false

      - name: Set CUDA and PyTorch versions
        run: |
          echo "MATRIX_CUDA_VERSION=$(echo ${{ matrix.MATRIX_CUDA_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=$(echo ${{ matrix.MATRIX_TORCH_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_PYTHON_VERSION=$(echo ${{ matrix.MATRIX_PYTHON_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_CUDA_VERSION=$(echo ${{ matrix.MANYLINUX_CUDA_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_CUDA_COMPAT_VERSION=$(echo ${{ matrix.MANYLINUX_CUDA_COMPAT_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_GLIBC_VERSION=$(echo ${{ matrix.MANYLINUX_GLIBC_VERSION }})" >> $GITHUB_ENV
          echo "CI_AUDITWHEEL_EXCLUDES=$(echo ${{ matrix.CI_AUDITWHEEL_EXCLUDES }})" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: |
          uv venv --python 3.13
          uv pip install cibuildwheel

      - name: Build wheels for Pytorch ${{ matrix.torch-version }}+cu${{ matrix.cuda-version }}
        run: |
          .venv/bin/cibuildwheel ./hopper --output-dir dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.target-arch }}
          CIBW_BUILD: cp${{ env.MATRIX_PYTHON_VERSION }}-*64
          CIBW_MANYLINUX_X86_64_IMAGE: pytorch/manylinux2_28-builder:cuda${{ env.MANYLINUX_CUDA_VERSION }}
          CIBW_MANYLINUX_AARCH64_IMAGE: pytorch/manylinuxaarch64-builder:cuda${{ env.MANYLINUX_CUDA_VERSION }}
          CIBW_BEFORE_ALL: >
            curl -LsSf https://astral.sh/uv/install.sh | sh
          # TODO(charlie): The PyTorch CUDA 12.9 index is missing cuda-bindings==12.9.4, but PyTorch 2.10 depends on it.
          CIBW_BEFORE_BUILD_LINUX: >
            uv pip install --system typing-extensions==4.12.2 setuptools wheel ninja &&
            if [ "${MATRIX_CUDA_VERSION}" = "129" ] && [ "${MATRIX_TORCH_VERSION}" = "2.10" ]; then uv pip install --system cuda-bindings==12.9.4; fi &&
            uv pip install --system --no-cache-dir torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/cu${MATRIX_CUDA_VERSION} &&
            bash build_scripts/prepare_for_build.sh ${{ steps.flash-attention-3-version.outputs.version }}
          CIBW_ENVIRONMENT: >
            PATH=$PATH:/root/.local/bin
            CUDA_HOME="/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}"
            LIBRARY_PATH="/usr/lib64"
            LD_LIBRARY_PATH="/usr/lib64:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/lib64:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/targets/${{ matrix.target-arch }}-linux/lib:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/extras/CUPTI/lib64"
            LDFLAGS="-ldl -L/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/targets/${{ matrix.target-arch }}-linux/lib/stubs"
            AUDITWHEEL_PLAT="manylinux_${{ env.MANYLINUX_GLIBC_VERSION }}_$(uname -m)"
            MATRIX_CUDA_VERSION="${{ env.MATRIX_CUDA_VERSION }}"
            MATRIX_TORCH_VERSION="${{ env.MATRIX_TORCH_VERSION }}"
            MATRIX_PYTHON_VERSION="${{ env.MATRIX_PYTHON_VERSION }}"
            MANYLINUX_CUDA_VERSION="${{ env.MANYLINUX_CUDA_VERSION }}"
            MANYLINUX_CUDA_COMPAT_VERSION="${{ env.MANYLINUX_CUDA_COMPAT_VERSION }}"
            CI_AUDITWHEEL_EXCLUDES="${{ env.CI_AUDITWHEEL_EXCLUDES }}"
            FLASH_ATTENTION_FORCE_BUILD="TRUE"
            FLASH_ATTENTION_FORCE_CXX11_ABI=${{ matrix.cxx11-abi }}
            MAX_JOBS=8
            UV_PYTHON=/opt/python/cp${{ env.MATRIX_PYTHON_VERSION }}-cp${{ env.MATRIX_PYTHON_VERSION }}/bin/python
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w /tmp/cibuildwheel/repaired_wheel {wheel} ${CI_AUDITWHEEL_EXCLUDES}"
          CIBW_BUILD_FRONTEND: "build[uv]; args: --no-isolation"

      - name: Embed SBOM into wheel
        run: |
          for wheel in dist/*.whl; do
            uv run --script build_scripts/embed_patches.py "$wheel" "build_scripts/patches/${FLASH_ATTENTION_3_VERSION}" \
              --source-repo "https://github.com/Dao-AILab/flash-attention" \
              --source-tag "${FLASH_ATTENTION_3_VERSION}" \
              --source-commit "${SOURCE_COMMIT}" \
              --build-repo "https://github.com/astral-sh-build/build-flash-attention-3" \
              --build-commit "${BUILD_COMMIT}"
          done
        env:
          FLASH_ATTENTION_3_VERSION: ${{ steps.flash-attention-3-version.outputs.version }}
          SOURCE_COMMIT: ${{ steps.source-commit.outputs.sha }}
          BUILD_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name != 'release'
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}
          if-no-files-found: error

      - name: Upload wheels to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          files: ./dist/*.whl
          tag_name: ${{ github.ref_name }}
          append_body: true
